<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Social Media Card with Tooltip</title>

<style>
body{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#f4f4f4;
}

.card{
  background:#eee;
  display:flex;
  gap:20px;
  padding:25px;
  border-radius:12px;
  box-shadow:0 0 20px rgba(0,0,0,0.05);
}

.socialContainer{
  width:52px;
  height:52px;
  background:#2c2c2c;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
  transition:.3s;
  position:relative;
  overflow:visible;
}

.containerOne:hover{ background:#333; }
.containerTwo:hover{ background:#00acee; }
.containerThree:hover{ background:#0072b1; }
.containerFour:hover{ background:#128C7E; }

.socialContainer:active{
  transform:scale(0.9);
}

.socialSvg{
  width:20px;
  height:20px;
}

.socialSvg path{
  fill:white;
}

.socialContainer:hover .socialSvg{
  animation:slide-in-top .3s both;
}

/* 🔥 TOOLTIP */
.tooltip{
  position:absolute;
  bottom:130%;
  left:50%;
  transform:translateX(-50%);
  background:#262626;
  color:white;
  padding:6px 10px;
  font-size:12px;
  border-radius:6px;
  white-space:nowrap;
  opacity:0;
  pointer-events:none;
  transition:0.25s;
}

.tooltip::after{
  content:"";
  position:absolute;
  top:100%;
  left:50%;
  transform:translateX(-50%);
  border:6px solid transparent;
  border-top-color:#262626;
}

.socialContainer:hover .tooltip{
  opacity:1;
  bottom:145%;
}

@keyframes slide-in-top{
  from{ transform:translateY(-40px); opacity:0; }
  to{ transform:translateY(0); opacity:1; }
}
</style>
</head>

<body>

<div class="card">

  <!-- GitHub -->

    <span class="tooltip">GitHub</span>
    <svg class="socialSvg" viewBox="0 0 24 24">

    </svg>

  <!-- Twitter -->
  <a href="#" class="socialContainer containerTwo">
    <span class="tooltip">Twitter</span>
    <svg class="socialSvg" viewBox="0 0 16 16">

    <svg class="socialSvg" viewBox="0 0 448 512">
      <path d="M100.28 448H7.4V148.9h92.88zM53.79 108.1C24.09 108.1 0 83.5 0 53.8a53.79 53.79 0 0 1 107.58 0c0 29.7-24.1 54.3-53.79 54.3zM447.9 448h-92.68V302.4c0-34.7-.7-79.2-48.29-79.2-48.29 0-55.69 37.7-55.69 76.7V448h-92.78V148.9h89.08v40.8h1.3c12.4-23.5 42.69-48.3 87.88-48.3 94 0 111.28 61.9 111.28 142.3V448z"/>

  <!-- WhatsApp -->

    </svg>
  </a>

</div>

</body>
</html>
