<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="1.png">
<meta charset="UTF-8">
<title>Skills | Harshil</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background: linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#1c1c1c);
    background-size:400% 400%;
    animation: gradient 10s ease infinite;
    color:white;
    height:100vh;
    overflow:hidden;
}

@keyframes gradient{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

/* NAVBAR */
nav{
    height:70px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 50px;
}

nav h1{
    color:#00eaff;
    font-size:26px;
}

nav ul{
    list-style:none;
    display:flex;
    gap:25px;
}

nav ul li{
    cursor:pointer;
    position:relative;
}

nav ul li::after{
    content:'';
    width:0;
    height:2px;
    background:#00eaff;
    position:absolute;
    bottom:-6px;
    left:0;
    transition:0.3s;
}

nav ul li:hover::after{
    width:100%;
}

/* MAIN SKILLS */
.skills{
    height:calc(100vh - 70px);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
}

.skills-card{
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(15px);
    border-radius:25px;
    padding:40px;
    max-width:1000px;
    width:100%;
    box-shadow:0 25px 60px rgba(0,0,0,0.6);
}

/* HEADER */
.skills-header{
    text-align:center;
    margin-bottom:30px;
}

.skills-header h2{
    font-size:38px;
}

.skills-header span{
    color:#00eaff;
}

/* SKILL GRID */
.skill-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:30px;
}

/* SKILL */
.skill{
    background:rgba(255,255,255,0.08);
    padding:20px;
    border-radius:18px;
}

.skill-name{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
    font-size:15px;
}

.bar{
    height:8px;
    background:#333;
    border-radius:10px;
    overflow:hidden;
}

.bar span{
    height:100%;
    display:block;
    background:linear-gradient(90deg,#00eaff,#00ffa2);
    width:0;
    animation: fill 1.5s forwards;
}

/* ANIMATION */
@keyframes fill{
    from{width:0}
    to{width:var(--level)}
}

/* RESPONSIVE */
@media(max-width:768px){
    nav{padding:0 20px}
    .skill-grid{
        grid-template-columns:1fr;
    }
}
a {
    color: white;
    text-decoration: none;
}

a:visited {
    color: white;
}

a:hover {
    color: #00eaff;
}
</style>
</head>

<body>

<nav>
    <h1>Harshil's Portfolio</h1>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="About.html">About</a></li>
        <li><a href="skills.html">Skill</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="education.html">Education</a></li>
        <li><a href="contact.html">Contact</a></li>
        
    </ul>
</nav>

<section class="skills">
    <div class="skills-card">
        <div class="skills-header">
            <h2>My <span>Skills</span></h2>
            <p>Technologies & tools I work with</p>
        </div>

        <div class="skill-grid">

            <div class="skill">
                <div class="skill-name">
                    <span>HTML</span>
                    <span>90%</span>
                </div>
                <div class="bar"><span style="--level:90%"></span></div>
            </div>

            <div class="skill">
                <div class="skill-name">
                    <span>CSS</span>
                    <span>85%</span>
                </div>
                <div class="bar"><span style="--level:85%"></span></div>
            </div>

            <div class="skill">
                <div class="skill-name">
                    <span>JavaScript</span>
                    <span>75%</span>
                </div>
                <div class="bar"><span style="--level:75%"></span></div>
            </div>

            <div class="skill">
                <div class="skill-name">
                    <span>Python</span>
                    <span>70%</span>
                </div>
                <div class="bar"><span style="--level:70%"></span></div>
            </div>

            <div class="skill">
                <div class="skill-name">
                    <span>Git & GitHub</span>
                    <span>65%</span>
                </div>
                <div class="bar"><span style="--level:65%"></span></div>
            </div>

            <div class="skill">
                <div class="skill-name">
                    <span>Responsive Design</span>
                    <span>80%</span>
                </div>
                <div class="bar"><span style="--level:80%"></span></div>
            </div>

        </div>
    </div>
</section>

</body>
</html>
